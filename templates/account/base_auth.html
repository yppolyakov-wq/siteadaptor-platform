{% extends "base.html" %}
{% load i18n %}
{% block body %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-sm">
    <h1 class="text-2xl font-bold mb-6 text-center">{% block auth_title %}{% endblock %}</h1>
    {% if messages %}
      {% for m in messages %}
        <div class="mb-4 rounded-lg bg-gray-100 text-gray-800 px-4 py-2 text-sm">{{ m }}</div>
      {% endfor %}
    {% endif %}
    <div class="bg-white p-6 rounded-2xl shadow-sm">
      {% block auth_content %}{% endblock %}
    </div>
  </div>
</div>
{% endblock %}
