{% extends "storefront/_base.html" %}
{% load i18n %}
{% block title %}{% trans "Link expired" %} · {{ request.tenant.name }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto text-center">
  <h1 class="text-2xl font-bold mb-2">{% trans "Link expired or already used" %}</h1>
  <p class="text-gray-600 mb-4">{% trans "Please request a new login link." %}</p>
  <a href="{% url 'account-login' %}" class="font-medium" style="color: var(--accent);">{% trans "Back to login" %} &rarr;</a>
</div>
{% endblock %}
