<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ request.tenant.name|default:"Shop" }}{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
  <header class="bg-white border-b">
    <div class="max-w-3xl mx-auto px-4 py-4">
      <a href="{% url 'storefront-home' %}" class="text-lg font-bold">{{ request.tenant.name|default:"Shop" }}</a>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8">
    {% if messages %}
      {% for m in messages %}
        <div class="mb-4 rounded-lg px-4 py-2 text-sm {% if m.tags == 'error' %}bg-red-50 text-red-700{% else %}bg-green-50 text-green-800{% endif %}">{{ m }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <footer class="max-w-3xl mx-auto px-4 py-8 text-xs text-gray-400">
    {{ request.tenant.name|default:"" }}
  </footer>
</body>
</html>
