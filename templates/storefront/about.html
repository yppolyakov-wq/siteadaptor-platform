{% extends "storefront/_base.html" %}
{% load i18n siteui %}
{% block content %}
<section class="mb-10 max-w-2xl">
  <h1 class="text-2xl md:text-3xl font-bold mb-4" data-edit="about_title">{{ site.about_title|default:_("About us") }}</h1>
  {% if site.about_text or is_preview %}
    <p class="text-gray-600 leading-relaxed whitespace-pre-line" data-edit="about_text">{{ site.about_text }}</p>
  {% endif %}
</section>
{% include "storefront/sections/_contact.html" %}
{% page_blocks "info" %}
{% endblock %}
