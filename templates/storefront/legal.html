{% extends "storefront/_base.html" %}
{% block title %}{{ legal_title }} — {{ request.tenant.name|default:"Shop" }}{% endblock %}

{% block content %}
<a href="{% url 'storefront-home' %}" class="inline-flex items-center gap-1 text-sm text-indigo-600 hover:underline mb-4">← {{ request.tenant.name|default:"Shop" }}</a>
<article class="bg-white rounded-2xl shadow-sm p-6 max-w-2xl">
  <h1 class="text-2xl font-bold mb-4">{{ legal_title }}</h1>
  <div class="text-gray-700 whitespace-pre-line leading-relaxed">{{ legal_body }}</div>
</article>
{% endblock %}
