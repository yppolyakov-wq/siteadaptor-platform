{% load i18n %}{# P1: липкая мобильная панель действий (только мобайл). Цели ≥48px (WCAG 2.5.8). #}
{% if storefront_actions %}
<nav aria-label="{% trans 'Quick actions' %}"
     class="sm:hidden fixed bottom-0 inset-x-0 z-40 bg-white/95 backdrop-blur border-t border-gray-200
            flex" style="padding-bottom: env(safe-area-inset-bottom);">
  {% for a in storefront_actions %}
    <a href="{{ a.url }}"
       class="flex-1 flex flex-col items-center justify-center gap-0.5 py-2.5 min-h-[56px] text-xs font-medium
              focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-[-2px]
              {% if a.kind == 'primary' %}text-white{% else %}text-gray-700 active:bg-gray-100{% endif %}"
       {% if a.kind == 'primary' %}style="background: var(--accent);"{% endif %}>
      <span class="text-lg leading-none" aria-hidden="true">{{ a.icon }}</span>
      <span>{{ a.label }}</span>
    </a>
  {% endfor %}
</nav>
{# Спейсер, чтобы контент не прятался под фиксированной панелью на мобайле. #}
<div class="sm:hidden h-16" aria-hidden="true"></div>
{% endif %}
