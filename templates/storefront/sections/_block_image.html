{% load i18n %}
{# D.2 C-блок: одно фото + подпись. Пусто → ничего. UC6-4: 📷 замена на канве + скругление. #}
{% if block.url %}
<figure class="my-8">
  <div class="max-w-4xl mx-auto px-4 relative">
    {% if is_preview and block_id %}
      <button type="button" data-photo-edit data-edit-model="cblock" data-edit-pk="{{ block_id }}"
         class="sf-photo-edit hidden absolute top-2 right-6 z-10 w-7 h-7 rounded-full bg-white/95 shadow ring-1 ring-gray-200 flex items-center justify-center text-sm hover:text-indigo-600"
         title="{% trans 'Replace photo' %}" aria-label="{% trans 'Replace photo' %}">📷</button>
    {% endif %}
    <img src="{{ block.url }}" alt="{{ block.caption }}" loading="lazy" decoding="async" class="w-full {% if block.rounded == 'none' %}rounded-none{% elif block.rounded == '3xl' %}rounded-3xl{% else %}rounded-2xl{% endif %} object-cover">
    {% if block.caption %}<figcaption class="text-sm text-gray-500 mt-2 text-center">{{ block.caption }}</figcaption>{% endif %}
  </div>
</figure>
{% elif is_preview %}{% include "storefront/sections/_block_placeholder.html" with label="Bild — klicken zum Hinzufügen" %}{% endif %}
