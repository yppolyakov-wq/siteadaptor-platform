{% load i18n siteui %}{# Секция отзывов (M20 ⑤a): имя + текст из site_config. #}
{% if site.testimonials %}
<section data-reveal class="mb-10">
  <h2 class="text-xl md:text-2xl font-bold mb-4">{% trans "What our customers say" %}</h2>
  <div class="{% grid_classes site 'testimonials' %}">
    {% for t in site.testimonials %}
      <figure class="bg-white rounded-2xl shadow-sm p-5">
        <blockquote class="text-gray-700 whitespace-pre-line">“{{ t.text }}”</blockquote>
        {% if t.name %}<figcaption class="mt-3 text-sm font-medium text-gray-500">— {{ t.name }}</figcaption>{% endif %}
      </figure>
    {% endfor %}
  </div>
</section>
{% endif %}
