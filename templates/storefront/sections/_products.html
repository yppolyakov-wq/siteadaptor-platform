{% load i18n %}{# Секция каталога (Track C1/C2): превью товаров. #}
{% if products_preview %}
<section data-reveal class="mb-10">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-xl md:text-2xl font-bold">{% trans "Our products" %}</h2>
    <a href="{% url 'storefront-products' %}" class="text-sm font-medium text-indigo-600 hover:underline">{% trans "View all" %} →</a>
  </div>
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
    {% for p in products_preview %}
      {% include "storefront/_product_card.html" %}
    {% endfor %}
  </div>
</section>
{% endif %}
