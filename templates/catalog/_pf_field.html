{% load i18n widget_tweaks %}
<div>
  <label class="block text-sm font-medium mb-1" for="{{ field.id_for_label }}">{{ field.label }}</label>
  {% render_field field class="w-full rounded-lg border border-gray-300 px-3 py-2" %}
  {% if field.help_text %}<p class="text-xs text-gray-400 mt-1">{{ field.help_text }}</p>{% endif %}
  {% for err in field.errors %}<p class="text-xs text-red-600 mt-1">{{ err }}</p>{% endfor %}
</div>
