{% comment %}S1 (упрощение кабинета): tab-bar хаба над контентом страницы. Активный
таб — по context.nav. Рендерится тегом {% hub_tabs "<hub>" %} (templatetags/cabinet).{% endcomment %}
{% if tabs %}
<div class="border-b border-gray-200 mb-5 overflow-x-auto">
  <div class="flex gap-1 flex-nowrap" role="tablist">
    {% for t in tabs %}
      <a href="{% url t.url_name %}" role="tab" aria-selected="{% if t.active %}true{% else %}false{% endif %}"
         class="px-3 py-2 text-sm font-medium border-b-2 -mb-px whitespace-nowrap {% if t.active %}border-indigo-600 text-indigo-700{% else %}border-transparent text-gray-500 hover:text-gray-700{% endif %}">{{ t.label }}</a>
    {% endfor %}
  </div>
</div>
{% endif %}
