{% load i18n %}
<h1 class="text-2xl font-bold mb-1">Geschafft! 🎉</h1>
<p class="text-sm text-gray-500 mb-4">Dein Geschäft ist startklar. Alles lässt sich später im Dashboard anpassen.</p>
<div class="flex items-center gap-3">
  <form method="post">{% csrf_token %}
    <button type="submit" name="action" value="back" class="text-sm text-gray-500 px-3 py-2.5 hover:underline">← Zurück</button>
  </form>
  <a href="{% url 'dashboard' %}" class="bg-indigo-600 text-white text-sm font-medium px-5 py-2.5 rounded-lg hover:bg-indigo-700">Zum Dashboard</a>
  <a href="{% url 'modules' %}" class="text-sm text-indigo-600 px-3 py-2.5 hover:underline">Module ansehen</a>
</div>
