{# Карточка брони: акция, количество и крупный код выдачи. #}
<table role="presentation" width="100%" cellpadding="0" cellspacing="0"
       style="background:#fafafa;border:1px solid #e4e4e7;border-radius:10px;margin:20px 0;">
  <tr>
    <td style="padding:16px 20px;font-family:Arial,Helvetica,sans-serif;font-size:14px;color:#3f3f46;">
      <p style="margin:0 0 4px;"><strong>Aktion:</strong> {{ promotion.title_text }}</p>
      <p style="margin:0 0 12px;"><strong>Menge:</strong> {{ reservation.quantity }}</p>
      <div style="background:#18181b;color:#ffffff;border-radius:8px;padding:12px;text-align:center;
                  font-size:22px;letter-spacing:3px;font-weight:bold;">
        {{ reservation.reference_code }}
      </div>
      <p style="margin:12px 0 0;font-size:12px;color:#a1a1aa;">Bitte zeigen Sie diesen Code bei der Abholung vor.</p>
    </td>
  </tr>
</table>
