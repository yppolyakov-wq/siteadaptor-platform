{# Базовый HTML-каркас писем: таблично, инлайн-стили (совместимость почтовиков),
   без картинок и трекинга — просто и ненавязчиво. Текстовая версия — рядом .txt. #}
<!doctype html>
<html lang="de">
<body style="margin:0;padding:0;background:#f4f4f5;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f5;">
    <tr>
      <td align="center" style="padding:24px 12px;">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0"
               style="max-width:560px;width:100%;background:#ffffff;border-radius:12px;">
          <tr>
            <td style="padding:32px;font-family:Arial,Helvetica,sans-serif;color:#18181b;font-size:15px;line-height:1.6;">
              {% block content %}{% endblock %}
              {% if unsubscribe_url %}
                <p style="margin:32px 0 0;font-size:12px;color:#a1a1aa;">
                  — <a href="{{ unsubscribe_url }}" style="color:#a1a1aa;">Keine E-Mails mehr erhalten</a>
                </p>
              {% endif %}
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
