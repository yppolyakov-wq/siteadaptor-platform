# Локальные проверки перед коммитом. Установка (один раз):
#   uv pip install pre-commit && pre-commit install
# Прогнать вручную по всем файлам:  pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff           # линт + автофикс
        args: [--fix]
      - id: ruff-format    # форматирование
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
