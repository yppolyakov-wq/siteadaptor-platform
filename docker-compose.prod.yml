# Production stack для app-сервера (CPX21).
# PostgreSQL живёт на отдельном db-сервере (CCX13) — задаётся через DB_HOST в .env.prod.
# Redis и Caddy крутятся здесь же.
#
# Деплой: ./scripts/deploy.sh  (см. docs/DEVELOPMENT-GUIDE.md → раздел Деплой)

services:
  web:
    build: .
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60
    expose:
      - "8000"
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build: .
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    command: celery -A config worker -l info --concurrency 4
    depends_on:
      - redis
    restart: unless-stopped

  beat:
    build: .
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  caddy:
    build: ./caddy
    env_file: .env.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

volumes:
  redisdata:
  caddy_data:
  caddy_config:
