# Production stack.
#
# Два режима запуска:
#   1) Один сервер (dev/тест): Postgres крутится здесь же, в Docker.
#        docker compose -f docker-compose.prod.yml --profile single up -d
#        (в .env.prod:  DB_HOST=db)
#   2) Прод: Postgres на отдельном db-сервере (CCX13), сюда НЕ поднимается.
#        docker compose -f docker-compose.prod.yml up -d
#        (в .env.prod:  DB_HOST=<приватный IP db-сервера>)
#
# Redis и Caddy крутятся здесь в обоих режимах.
# Деплой: ./scripts/deploy.sh [single]  (см. docs/DEVELOPMENT-GUIDE.md → Деплой)

services:
  # Локальный Postgres — только в режиме single (профиль). На проде с отдельным
  # db-сервером этот сервис не стартует.
  db:
    image: postgres:16-alpine
    profiles: ["single"]
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    # collectstatic при старте самого web-контейнера: одноразовый `run --rm`
    # складывал статику в эфемерный контейнер, а у gunicorn /app/staticfiles был
    # пуст → ManifestStaticFilesStorage падал 500 на /admin/.
    command: >-
      sh -c "python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"
    expose:
      - "8000"
    volumes:
      - media:/app/media  # загруженные картинки переживают передеплой
    networks:
      default:
        # Алиас, чтобы Caddy слал on-demand TLS ask-запрос с Host: siteadaptor.de
        # (резолвится в public-схему → verify_domain отвечает 200).
        aliases:
          - siteadaptor.de
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-H", "Host: siteadaptor.de", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build: .
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    command: celery -A config worker -l info --concurrency 4
    depends_on:
      - redis
    restart: unless-stopped

  beat:
    build: .
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  caddy:
    build: ./caddy
    env_file: .env.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

volumes:
  pgdata:        # данные Postgres в режиме single; деплой их не стирает
  redisdata:
  caddy_data:
  caddy_config:
